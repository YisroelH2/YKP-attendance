<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#E8EAF6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="YKP Live">
  <title>YKP Live Sessions</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root{
      --accent:#4f46e5; --on:#16D49C; --late:#FF6B13;
      --bg:#f5f6fa; --surface:#fff; --ink:#1a1b2e; --ink-soft:#6b7280;
      --r:16px; --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;border:none;background:none;font-family:-apple-system,'Segoe UI',sans-serif}
    body{background:var(--bg);min-height:100svh;padding:calc(var(--safe-t) + 16px) 16px calc(var(--safe-b) + 16px);color:var(--ink)}
    .hdr{margin-bottom:20px}
    .hdr-brand{font-size:13px;font-weight:700;color:var(--ink-soft);letter-spacing:.5px;text-transform:uppercase}
    .hdr-date{font-size:24px;font-weight:800;color:var(--ink);line-height:1.1}
    .hdr-heb{font-size:14px;color:var(--ink-soft);margin-top:2px;direction:rtl}
    .now-lbl{font-size:11px;font-weight:700;color:var(--ink-soft);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
    .ses-card{background:var(--surface);border-radius:var(--r);box-shadow:0 2px 12px rgba(0,0,0,.09);padding:18px 20px;margin-bottom:12px;cursor:pointer;transition:transform .12s,box-shadow .12s;display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;position:relative;overflow:hidden}
    .ses-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px}
    .ses-card.ongoing::before{background:var(--on)}
    .ses-card.upcoming::before{background:var(--accent)}
    .ses-card:active{transform:scale(.98);box-shadow:0 1px 6px rgba(0,0,0,.08)}
    .sc-body{flex:1;min-width:0}
    .sc-badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;border-radius:99px;padding:2px 9px;margin-bottom:5px}
    .sc-badge.ongoing{background:#e3fbf4;color:#0d9270}
    .sc-badge.upcoming{background:#eef0fb;color:var(--accent)}
    .sc-badge .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
    .sc-name{font-size:19px;font-weight:800;line-height:1.2;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sc-sub{font-size:12.5px;color:var(--ink-soft);font-weight:600}
    .sc-arrow{color:#c0c5d8;flex-shrink:0}
    .sc-time-ring{width:52px;height:52px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
    .sc-time{font-size:12px;font-weight:800;text-align:center;line-height:1.15}
    .sc-time .h{font-size:16px}
    .empty{text-align:center;padding:40px 16px;color:var(--ink-soft)}
    .empty-icon{font-size:36px;margin-bottom:10px}
    .empty-msg{font-size:15px;font-weight:600}
    .empty-sub{font-size:13px;margin-top:4px;color:#9ca3af}
    .open-app{display:block;background:var(--accent);color:#fff;font-weight:700;font-size:15px;border-radius:var(--r);padding:14px;text-align:center;text-decoration:none;margin-top:20px;box-shadow:0 4px 16px rgba(79,70,229,.35)}
    .refresh-btn{position:fixed;top:calc(var(--safe-t)+12px);right:16px;width:36px;height:36px;border-radius:50%;background:var(--surface);box-shadow:0 1px 6px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft)}
    .section-lbl{font-size:11px;font-weight:700;color:var(--ink-soft);letter-spacing:.5px;text-transform:uppercase;margin:16px 0 8px}
    #status{font-size:12px;color:var(--ink-soft);text-align:center;margin-top:16px}
  </style>
</head>
<body>
  <div class="hdr">
    <div class="hdr-brand">YKP Attendance</div>
    <div class="hdr-date" id="hdrDate">—</div>
    <div class="hdr-heb" id="hdrHeb"></div>
  </div>
  <div id="content"><div class="empty"><div class="empty-icon">⏳</div><div class="empty-msg">Loading sessions…</div></div></div>
  <a href="index.html" class="open-app">Open Full App →</a>
  <button class="refresh-btn" id="refreshBtn" onclick="loadSessions()" title="Refresh">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
  </button>
  <div id="status"></div>

  <script>
    const SB_URL = 'https://jrvflnjynwqiovcbqihr.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpydmZsbmp5bndxaW92Y2JxaWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExOTY2NTIsImV4cCI6MjA5Njc3MjY1Mn0.qzgIXidqAijIVfDo6YYwbGtOHUw7ZZh3_PEuXy-rkqM';
    const sb = window.supabase.createClient(SB_URL, SB_KEY);

    function todayStr(){const d=new Date(),p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;}
    function fmtTime12(t){if(!t)return '';const[h,m]=t.split(':').map(Number);const ap=h>=12?'PM':'AM';return(h%12||12)+':'+(String(m).padStart(2,'0'))+' '+ap;}
    function fmtDate(){const d=new Date();return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});}

    async function fetchHeb(){
      const d=todayStr();const k='hebdate_'+d;const c=localStorage.getItem(k);if(c)return c;
      try{const[y,mo,dd]=d.split('-');const r=await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${y}&gm=${mo}&gd=${dd}&g2h=1`);const j=await r.json();const h=j.hebrew||'';localStorage.setItem(k,h);return h;}catch{return '';}
    }

    function timeToMins(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m;}
    function nowMins(){const n=new Date();return n.getHours()*60+n.getMinutes();}
    function sesDuration(s){return s.end_time?timeToMins(s.end_time):timeToMins(s.start_time)+45;}

    async function loadSessions(){
      document.getElementById('hdrDate').textContent=fmtDate();
      fetchHeb().then(h=>{document.getElementById('hdrHeb').textContent=h;});
      document.getElementById('status').textContent='Refreshed '+new Date().toLocaleTimeString();

      const{data:sessions,error}=await sb.from('sessions').select('*').order('start_time');
      if(error||!sessions){document.getElementById('content').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-msg">Could not load</div><div class="empty-sub">Make sure you\'re signed in to the main app</div></div>';return;}

      const now=nowMins();
      const ongoing=sessions.filter(s=>s.start_time&&timeToMins(s.start_time)<=now&&sesDuration(s)>now);
      const upcoming=sessions.filter(s=>s.start_time&&timeToMins(s.start_time)>now&&timeToMins(s.start_time)<=now+120);

      let html='';

      if(ongoing.length){
        html+='<div class="section-lbl">🔴 Happening now</div>';
        ongoing.forEach(s=>{
          const minsAgo=now-timeToMins(s.start_time);
          const dest=s.type==='zal'?`index.html#zal-${s.id}`:`index.html#mark-${s.id}`;
          html+=`<a class="ses-card ongoing" href="index.html" onclick="nav('${s.id}','${s.type}')">
            <div class="sc-time-ring"><div class="sc-time"><span class="h">${minsAgo}</span><br>min</div></div>
            <div class="sc-body">
              <div class="sc-badge ongoing"><span class="dot"></span>In progress</div>
              <div class="sc-name">${esc(s.name)}</div>
              <div class="sc-sub">Started ${fmtTime12(s.start_time)} · ${minsAgo} min ago</div>
            </div>
            <svg class="sc-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </a>`;
        });
      }

      if(upcoming.length){
        html+='<div class="section-lbl">📅 Coming up</div>';
        upcoming.forEach(s=>{
          const minsUntil=timeToMins(s.start_time)-now;
          html+=`<a class="ses-card upcoming" href="#" onclick="nav('${s.id}','${s.type}');return false">
            <div class="sc-time-ring"><div class="sc-time"><span class="h">${minsUntil}</span><br>min</div></div>
            <div class="sc-body">
              <div class="sc-badge upcoming"><span class="dot"></span>In ${minsUntil} min</div>
              <div class="sc-name">${esc(s.name)}</div>
              <div class="sc-sub">Starts at ${fmtTime12(s.start_time)}</div>
            </div>
            <svg class="sc-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </a>`;
        });
      }

      if(!ongoing.length && !upcoming.length){
        html='<div class="empty"><div class="empty-icon">✅</div><div class="empty-msg">No sessions right now</div><div class="empty-sub">Check back soon or open the full app to see all sessions.</div></div>';
      }

      document.getElementById('content').innerHTML=html;
    }

    function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

    function nav(sessionId, type){
      // Store the target session in localStorage so main app can pick it up
      localStorage.setItem('widget_nav',JSON.stringify({sessionId,type,ts:Date.now()}));
      window.location.href='index.html';
    }

    loadSessions();
    // Auto-refresh every 2 minutes
    setInterval(loadSessions, 120000);
  </script>
</body>
</html>
